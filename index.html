<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO VOID | DROP 01 – SIGNAL LOST</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff;
            color: #000000;
        }
        .fade-in {
            animation: fadeIn 0.8s ease-in forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nav-link {
            position: relative;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: #000;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .product-image {
            transition: transform 0.5s ease;
        }
        .product-card:hover .product-image {
            transform: scale(1.02);
        }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #fff;
        }
        ::-webkit-scrollbar-thumb {
            background: #000;
        }
    </style>
</head>
<body class="antialiased selection:bg-black selection:text-white">

    <!-- Navigation -->
    <nav class="fixed w-full bg-white/95 backdrop-blur-sm z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 cursor-pointer" onclick="router('home')">
                    <span class="text-xl font-semibold tracking-widest">ECHO VOID</span>
                </div>
                <div class="hidden md:flex space-x-12">
                    <button onclick="router('home')" class="nav-link text-sm tracking-widest uppercase">Home</button>
                    <button onclick="router('shop')" class="nav-link text-sm tracking-widest uppercase">Shop</button>
                    <button onclick="router('about')" class="nav-link text-sm tracking-widest uppercase">About</button>
                    <button onclick="router('contact')" class="nav-link text-sm tracking-widest uppercase">Contact</button>
                </div>
                <div class="md:hidden">
                    <button onclick="toggleMobileMenu()" class="p-2">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-gray-100">
            <div class="px-6 py-4 space-y-4">
                <button onclick="router('home')" class="block w-full text-left text-sm tracking-widest uppercase">Home</button>
                <button onclick="router('shop')" class="block w-full text-left text-sm tracking-widest uppercase">Shop</button>
                <button onclick="router('about')" class="block w-full text-left text-sm tracking-widest uppercase">About</button>
                <button onclick="router('contact')" class="block w-full text-left text-sm tracking-widest uppercase">Contact</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main id="app" class="pt-16 min-h-screen">
        <!-- Content injected via JavaScript -->
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 py-12 mt-20">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0">
                <span class="text-lg font-semibold tracking-widest">ECHO VOID</span>
            </div>
            <div class="text-xs text-gray-500 tracking-widest uppercase">
                © 2026 ECHO VOID. All Rights Reserved.
            </div>
        </div>
    </footer>

    <script>
        // State Management
        const state = {
            currentPage: 'home',
            products: [
                {
                    id: 1,
                    name: "Black Edition",
                    price: "Soon",
                    image: "images/BLACK MOKUP.png",
                    description: "DROP 01 – SIGNAL LOST",
                    details: {
                        material: "Premium Cotton",
                        limited: "Limited 10 Pieces",
                        care: "Machine wash cold. Hang dry. Do not bleach.",
                        fabric: "100% Organic Cotton. 220 GSM heavyweight fabric. Pre-shrunk."
                    },
                    sizes: ["M", "L", "XL"]
                },
                {
                    id: 2,
                    name: "White Edition",
                    price: "Soon",
                    image: "images/mockup.png",
                    description: "DROP 01 – SIGNAL LOST",
                    details: {
                        material: "Premium Cotton",
                        limited: "Only 1 Sizes Have 1 Tshirt",
                        care: "Machine wash cold. Hang dry. Do not bleach.",
                        fabric: "100% Organic Cotton. 220 GSM heavyweight fabric. Pre-shrunk."
                    },
                    sizes: ["M", "L", "XL"]
                }
            ]
        };

        // Router Function
        function router(page, params = null) {
            state.currentPage = page;
            window.scrollTo(0, 0);
            
            const app = document.getElementById('app');
            
            switch(page) {
                case 'home':
                    app.innerHTML = renderHome();
                    break;
                case 'shop':
                    app.innerHTML = renderShop();
                    break;
                case 'product':
                    app.innerHTML = renderProduct(params);
                    break;
                case 'about':
                    app.innerHTML = renderAbout();
                    break;
                case 'contact':
                    app.innerHTML = renderContact();
                    break;
            }
            
            // Close mobile menu if open
            document.getElementById('mobile-menu').classList.add('hidden');
        }

        // Render Functions
        function renderHome() {
            return `
                <section class="min-h-[90vh] flex flex-col justify-center items-center px-6 relative overflow-hidden">
                    <div class="text-center fade-in">
                        <h1 class="text-6xl md:text-9xl font-semibold tracking-tighter mb-4">ECHO VOID</h1>
                        <p class="text-lg md:text-2xl tracking-[0.3em] uppercase text-gray-600 mb-12">DROP 01 – SIGNAL LOST</p>
                        <button onclick="router('shop')" class="border border-black px-8 py-3 text-sm tracking-widest uppercase hover:bg-black hover:text-white transition-colors duration-300">
                            View Collection
                        </button>
                    </div>
                    
                    <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 animate-bounce">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
                        </svg>
                    </div>
                </section>

                <section class="max-w-7xl mx-auto px-6 lg:px-8 py-20">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16">
                        ${state.products.map(product => `
                            <div class="product-card cursor-pointer group" onclick="router('product', ${product.id})">
                                <div class="aspect-[3/4] overflow-hidden bg-gray-50 mb-6">
                                    <img src="${product.image}" alt="${product.name}" class="product-image w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                                </div>
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h3 class="text-lg font-medium tracking-wide">${product.name}</h3>
                                        <p class="text-sm text-gray-500 mt-1">${product.description}</p>
                                    </div>
                                    <span class="text-sm font-medium">${product.price}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;
        }

        function renderShop() {
            return `
                <section class="max-w-7xl mx-auto px-6 lg:px-8 py-20 fade-in">
                    <div class="mb-16 text-center">
                        <h2 class="text-4xl md:text-5xl font-semibold tracking-tight mb-4">COLLECTION</h2>
                        <p class="text-gray-500 tracking-widest uppercase text-sm">DROP 01 – SIGNAL LOST</p>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-16">
                        ${state.products.map(product => `
                            <div class="product-card cursor-pointer group" onclick="router('product', ${product.id})">
                                <div class="aspect-[3/4] overflow-hidden bg-gray-50 mb-6">
                                    <img src="${product.image}" alt="${product.name}" class="product-image w-full h-full object-cover">
                                </div>
                                <div class="flex justify-between items-start border-t border-gray-100 pt-4">
                                    <div>
                                        <h3 class="text-lg font-medium tracking-wide">${product.name}</h3>
                                        <p class="text-xs text-gray-400 mt-1 uppercase tracking-wider">Limited Edition</p>
                                    </div>
                                    <span class="text-sm font-medium">${product.price}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;
        }

        function renderProduct(productId) {
            const product = state.products.find(p => p.id === productId);
            if (!product) return renderShop();

            return `
                <section class="max-w-7xl mx-auto px-6 lg:px-8 py-12 fade-in">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-24">
                        <!-- Product Image -->
                        <div class="aspect-[3/4] overflow-hidden bg-gray-50">
                            <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover">
                        </div>
                        
                        <!-- Product Details -->
                        <div class="flex flex-col justify-center">
                            <div class="mb-8">
                                <p class="text-xs tracking-[0.2em] uppercase text-gray-500 mb-2">${product.description}</p>
                                <h1 class="text-4xl md:text-5xl font-semibold tracking-tight mb-4">${product.name}</h1>
                                <p class="text-2xl font-light">${product.price}</p>
                            </div>

                            <div class="space-y-6 mb-12">
                                <div class="grid grid-cols-2 gap-4 text-sm">
                                    <div>
                                        <span class="text-gray-400 uppercase tracking-wider text-xs block mb-1">Fit</span>
                                        <span>${product.details.fit}</span>
                                    </div>
                                    <div>
                                        <span class="text-gray-400 uppercase tracking-wider text-xs block mb-1">Material</span>
                                        <span>${product.details.material}</span>
                                    </div>
                                    <div class="col-span-2">
                                        <span class="text-gray-400 uppercase tracking-wider text-xs block mb-1">Availability</span>
                                        <span class="border-b border-black pb-0.5">${product.details.limited}</span>
                                    </div>
                                </div>
                            </div>

                            <!-- Size Guide -->
                            <div class="mb-8">
                                <span class="text-xs uppercase tracking-wider text-gray-500 mb-3 block">Select Size</span>
                                <div class="flex gap-3">
                                    ${product.sizes.map(size => `
                                        <button class="w-12 h-12 border border-gray-200 flex items-center justify-center text-sm hover:border-black transition-colors">${size}</button>
                                    `).join('')}
                                </div>
                            </div>

                            <button class="w-full bg-black text-white py-4 text-sm tracking-[0.2em] uppercase hover:bg-gray-900 transition-colors mb-12">
                                Please Contact Via Whatsapp Or Instagram
                            </button>

                            <!-- Accordion Details -->
                            <div class="border-t border-gray-100 pt-8 space-y-6">
                                <div>
                                    <h4 class="text-xs uppercase tracking-wider mb-2">Fabric Details</h4>
                                    <p class="text-sm text-gray-600 leading-relaxed">${product.details.fabric}</p>
                                </div>
                                <div>
                                    <h4 class="text-xs uppercase tracking-wider mb-2">Care Instructions</h4>
                                    <p class="text-sm text-gray-600 leading-relaxed">${product.details.care}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderAbout() {
            return `
                <section class="max-w-4xl mx-auto px-6 lg:px-8 py-32 fade-in">
                    <div class="text-center mb-16">
                        <h2 class="text-4xl md:text-6xl font-semibold tracking-tight mb-8">ABOUT</h2>
                    </div>
                    
                    <div class="prose prose-lg mx-auto text-center">
                        <p class="text-xl md:text-2xl font-light leading-relaxed text-gray-900 mb-12">
                            ECHO VOID is built around controlled minimalism and intentional design. Each drop is limited. Each piece carries identity.
                        </p>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-20 text-left">
                            <div class="border-t border-black pt-4">
                                <h3 class="text-xs uppercase tracking-widest mb-2">Philosophy</h3>
                                <p class="text-sm text-gray-600">Less is more. We strip away the unnecessary to reveal the essential.</p>
                            </div>
                            <div class="border-t border-black pt-4">
                                <h3 class="text-xs uppercase tracking-widest mb-2">Production</h3>
                                <p class="text-sm text-gray-600">Small batches. Local manufacturing. Premium materials only.</p>
                            </div>
                            <div class="border-t border-black pt-4">
                                <h3 class="text-xs uppercase tracking-widest mb-2">Identity</h3>
                                <p class="text-sm text-gray-600">Clothing as a signal. Worn by those who understand silence.</p>
                            </div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderContact() {
            return `
                <section class="max-w-4xl mx-auto px-6 lg:px-8 py-32 fade-in">
                    <div class="text-center mb-16">
                        <h2 class="text-4xl md:text-6xl font-semibold tracking-tight mb-4">CONTACT</h2>
                        <p class="text-gray-500 tracking-widest uppercase text-sm">Direct Line</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-2xl mx-auto">
                        <a href="https://wa.me/+94705279663" target="_blank" class="group border border-gray-200 p-8 flex flex-col items-center justify-center hover:border-black transition-colors">
                            <svg class="w-6 h-6 mb-4" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                            </svg>
                            <span class="text-xs uppercase tracking-widest">WhatsApp</span>
                        </a>

                        <a href="https://www.instagram.com/ech0void?igsh=MTF1NmNseWMxMjI0Nw==" target="_blank" class="group border border-gray-200 p-8 flex flex-col items-center justify-center hover:border-black transition-colors">
                            <svg class="w-6 h-6 mb-4" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                            </svg>
                            <span class="text-xs uppercase tracking-widest">Instagram</span>
                        </a>

                        <a href="echovoidsale@gmail.com" class="group border border-gray-200 p-8 flex flex-col items-center justify-center hover:border-black transition-colors">
                            <svg class="w-6 h-6 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                            <span class="text-xs uppercase tracking-widest">Email</span>
                        </a>
                    </div>

                    <div class="mt-16 text-center">
                        <p class="text-xs text-gray-400 uppercase tracking-widest">Response time: 24-48 hours</p>
                    </div>
                </section>
            `;
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            router('home');
        });
    </script>
</body>
</html>
